<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>💖 Una pregunta especial 💖</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      overflow: hidden;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 25px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      margin: 10px;
      border: none;
      border-radius: 15px;
      cursor: pointer;
    }

    #yes {
      background-color: #4CAF50;
      color: white;
    }

    #no {
      background-color: #f44336;
      color: white;
      position: absolute;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>¿Quieres ser mi enamorada? 💕</h1>
  <button id="yes">Sí 💖</button>
  <button id="no">No 😢</button>
</div>

<script>
  const noBtn = document.getElementById("no");
  const yesBtn = document.getElementById("yes");

  // ⚠️ CAMBIA ESTE NÚMERO POR EL TUYO (con código país, sin +)
  const numero = "51945154159"; // ejemplo Perú

  // Botón NO se escapa
  noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
  });

  // Botón SÍ → abre WhatsApp
  yesBtn.addEventListener("click", () => {
    const mensaje = encodeURIComponent("💖 Hola, sí quiero ser tu enamorada 😍");
    window.open(`https://wa.me/${numero}?text=${mensaje}`, "_blank");

    document.body.innerHTML = `
      <h1 style="text-align:center; margin-top:20%;">
        💖 ¡Ahora revisa WhatsApp! 😍
      </h1>
    `;
  });

  // (Opcional) si quieres que el NO también envíe algo
  noBtn.addEventListener("click", () => {
    const mensaje = encodeURIComponent("😢 Lo siento...");
    window.open(`https://wa.me/${numero}?text=${mensaje}`, "_blank");
  });
</script>

</body>
</html>
